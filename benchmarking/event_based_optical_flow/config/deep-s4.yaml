is_dnn: false           

data:
  root: "/datasets/VAROS"
  dataset: "v2e"         
  sequence: "s4"      
  height: 720
  width: 1280
  eval_hz: 10
  n_events_per_batch: 1800000
    #  idn1: 0
    #  idn2: 19

  load_gt_flow: True
  gt: "/datasets/VAROS-EINCM/s4/gt_flow"
  eval_dt: 1 

output:
  output_dir: "./outputs/VAROS/s4"
  show_interactive_result: false

solver:
  method: "pyramidal_patch_contrast_maximization"
  time_aware: False
  patch:
    initialize: "random"
    scale: 5
    crop_height: 720
    crop_width: 1280
    filter_type: "bilinear"
  motion_model: "2d-translation"
  warp_direction: "first"
  parameters:
    - "trans_x"
    - "trans_y"
  cost: "hybrid"
  outer_padding: 0
  cost_with_weight:
    multi_focal_normalized_gradient_magnitude: 1.
    total_variation: 0.01
  iwe:
    method: "bilinear_vote"
    blur_sigma: 1

optimizer:
  n_iter: 40
  method: "Newton-CG"
  max_iter: 25
  parameters:
    trans_x:
      min: -150
      max: 150
    trans_y:
      min: -150
      max: 150
